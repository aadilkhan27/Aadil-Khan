<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/Aadil-khan/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aadil Khan - Flutter Developer in India. متخصص in mobile app development, UI design, and scalable applications.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">

  <title>Aadil-khan</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="loader">
    <style>
      body {
        margin: 0;
      }

      /* 🌙 DARK MODE */
      @media (prefers-color-scheme: dark) {
        body {
          background-color: #0B0B12;
        }

        #loader {
          color: #ffffff;
        }

        .spinner {
          border: 4px solid rgba(255, 255, 255, 0.2);
          border-top: 4px solid #ff4d4f;
        }
      }

      /* ☀️ LIGHT MODE */
      @media (prefers-color-scheme: light) {
        body {
          background-color: #ffffff;
        }

        #loader {
          color: #000000;
        }

        .spinner {
          border: 4px solid rgba(0, 0, 0, 0.1);
          border-top: 4px solid #ff4d4f;
        }
      }

      #loader {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        font-family: Arial, sans-serif;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 12px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <div class="spinner"></div>
    <div>Loading Aadil Khan Profile</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loader');
      if (loader) loader.remove();
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
